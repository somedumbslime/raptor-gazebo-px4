camera:
  topic: auto
  topics:
    gimbal: /raptor/camera
    iris: /raptor/iris/camera
    px4: /front_camera/image_raw
  contract:
    gimbal:
      expected_width: 640
      expected_height: 480
      min_fps: 10.0
      max_no_frame_gap_s: 0.5
    iris:
      expected_width: 640
      expected_height: 480
      min_fps: 10.0
      max_no_frame_gap_s: 0.5
    px4:
      expected_width: 640
      expected_height: 480
      min_fps: 10.0
      max_no_frame_gap_s: 0.5

platform:
  type: gimbal
  gimbal:
    camera_topic: /raptor/camera
    yaw_topic: /raptor/gimbal/yaw_cmd
    pitch_topic: /raptor/gimbal/pitch_cmd
  iris:
    camera_topic: /raptor/iris/camera
    cmd_twist_topic: /raptor/iris/cmd_vel
    enable_topic: /raptor/iris/enable
    publish_enable: false
    control_mode: hold
    max_linear_z: 0.2
    max_yaw_rate: 0.4
    pitch_to_vertical_gain: 0.3
    yaw_to_yaw_rate_gain: 0.5
  px4:
    camera_topic: /front_camera/image_raw
    system_address: udpin://0.0.0.0:14540
    connect_timeout_s: 20.0
    action_timeout_s: 15.0
    command_hz: 30.0
    watchdog_timeout_s: 0.5
    offboard_enabled: true
    offboard_require_in_air: true
    cv_only: false
    cmd_smoothing_alpha: 0.35
    auto_arm: false
    auto_takeoff: false
    auto_arm_require_armable: true
    auto_arm_require_local_position: false
    takeoff_altitude_m: 3.0
    auto_arm_retry_s: 2.0
    auto_takeoff_retry_s: 4.0
    auto_takeoff_liftoff_timeout_s: 20.0
    in_air_alt_fallback_s: 8.0
    offboard_start_confirm_timeout_s: 3.0
    offboard_start_delay_after_liftoff_s: 1.2
    offboard_force_hold_on_takeoff_stall: true
    offboard_takeoff_mode_fallback_s: 4.0
    offboard_min_relative_alt_m: 0.6
    takeoff_confirm_alt_m: 0.6
    legacy_gimbal_mapping: true
    active_states: [LOCKED, LOST, SEARCHING, TRACKING_XY, TRACKING_XYZ]
    max_forward_m_s: 1.0
    max_right_m_s: 0.8
    max_down_m_s: 0.5
    max_yaw_rate_deg_s: 30.0
    pitch_to_vertical_gain: 0.4
    yaw_to_yaw_rate_gain: 20.0

px4:
  # Step 5.1 baseline: PX4 SITL smoke settings.
  system_address: udpin://0.0.0.0:14540
  connect_timeout_s: 20.0
  health_timeout_s: 20.0
  required_health_flags: [is_armable, is_local_position_ok]
  takeoff_altitude_m: 3.0
  takeoff_wait_s: 10.0
  takeoff_min_relative_alt_m: 1.0
  post_takeoff_hold_s: 2.0
  land_wait_s: 25.0
  auto_disarm_wait_s: 20.0
  offboard_smoke:
    enabled: true
    duration_s: 5.0
    send_hz: 10.0
    forward_m_s: 0.0
    right_m_s: 0.0
    down_m_s: 0.0
    yaw_rate_deg_s: 0.0

controller:
  control_hz: 20.0
  yaw_topic: /raptor/gimbal/yaw_cmd
  pitch_topic: /raptor/gimbal/pitch_cmd
  yaw_min: -1.4
  yaw_max: 1.4
  pitch_min: -0.7
  pitch_max: 0.7
  kp_yaw: 1.1
  kp_pitch: 0.9
  deadzone_x: 0.03
  deadzone_y: 0.04
  max_yaw_rate: 0.9
  max_pitch_rate: 0.7
  ema_alpha_x: 0.25
  ema_alpha_y: 0.25
  rate_smoothing_alpha: 0.35
  pitch_sign: 1.0

follow:
  enabled: false
  mode: xy
  xy_strategy: zone_track
  profile: balanced
  # zone_track strategy: 4-zone guide box + continuous steering field.
  zone_track_box_scale_x: 2.2
  zone_track_box_scale_y: 1.9
  zone_track_axis_hysteresis: 0.06
  zone_track_forward_speed_min: 0.34
  zone_track_forward_speed_max: 0.85
  zone_track_forward_speed_exponent: 0.85
  zone_track_steer_exponent: 1.35
  zone_track_forward_align_weight_x: 0.85
  zone_track_forward_steer_brake: 0.50
  zone_track_lateral_scale: 0.85
  zone_track_yaw_scale: 1.15
  zone_track_center_deadzone_x: 0.08
  zone_track_center_deadzone_y: 0.10
  zone_track_use_area_gate: false
  # Terminal charge: near target keep forward motion ("ring pass"), do not brake.
  terminal_charge_enabled: true
  terminal_charge_enter_area_ratio: 0.070
  terminal_charge_exit_area_ratio: 0.055
  terminal_charge_align_gate_x: 0.060
  terminal_charge_exit_align_gate_x: 0.120
  terminal_charge_required_frames: 4
  terminal_charge_speed: 0.95
  terminal_charge_misaligned_speed: 0.26
  terminal_charge_yaw_scale: 0.85
  terminal_charge_lateral_scale: 0.85
  # XY altitude hold assist during zone tracking (guidance-level).
  xy_alt_hold_enabled: true
  xy_alt_hold_min_forward_m_s: 0.10
  xy_alt_hold_min_active_alt_m: 1.2
  xy_alt_hold_kp: 0.75
  xy_alt_hold_kd: 0.30
  xy_alt_hold_max_vz: 0.30
  xy_alt_hold_ref_alpha: 0.06
  xy_alt_hold_release_s: 0.8
  # In terminal charge we relax floor pull-up to avoid braking near target.
  xy_alt_hold_disable_floor_in_terminal_charge: true
  xy_alt_hold_terminal_ref_alpha: 0.30
  # Always-on emergency low-altitude guard.
  xy_alt_hold_hard_emergency_enabled: true
  xy_alt_hold_hard_emergency_floor_m: 0.28
  xy_alt_hold_hard_emergency_release_m: 0.40
  xy_alt_hold_hard_emergency_vz_up: 0.30
  target_area_ratio: 0.00 #0.045
  min_distance_area_ratio: 0.12
  deadzone_x: 0.026
  deadzone_y: 0.04
  deadzone_area: 0.004
  kp_forward: 1.2
  kp_lateral: 1.0
  kp_vertical: 0.9
  kp_yaw: 1.15
  lateral_error_sign: 1.0
  yaw_error_sign: 1.0
  max_vx: 1.0
  max_vy: 0.48
  max_vz: 0.25
  max_yaw_rate: 0.55
  smoothing_alpha: 0.27

guidance:
  backend: target_guidance
  external_callable: target_guidance.entrypoint:create_policy
  external_pythonpath:
    - target-guidance

detector:
  type: yolo_onnx
  red:
    hsv_ranges:
      - lower: [0, 100, 80]
        upper: [10, 255, 255]
      - lower: [170, 100, 80]
        upper: [180, 255, 255]
    min_area: 150
    morphology_kernel: 5
    cls_id: 0
    cls_name: synthetic_target
    source: red_detector
  yolo_onnx:
    model_path: models/yolo26n.onnx
    backend: auto
    providers: [CUDAExecutionProvider, CPUExecutionProvider]
    input_size: [640, 640]
    conf_threshold: 0.1
    iou_threshold: 0.3
    max_detections: 100
    target_classes: [person]
    target_class_ids: []
    class_names: []
    has_objectness: auto
    fallback_to_cpu_on_error: false
    source: yolo_onnx

tracking:
  iou_match_threshold: 0.30
  max_missing_frames: 10

selector:
  backend: external
  stub_policy: max_area
  external_callable: raptor_ai.tracking.pts_external_selector:select_primary
  external_pythonpath:
    - primary-target-selection
  required_fields:
    - track_id
    - bbox_xyxy
    - confidence
    - class_id
    - class_name
    - visible
  field_map:
    confidence: conf
    class_id: cls_id
    class_name: cls_name
  external_context:
    pts_config_path: primary-target-selection/pts/resources/target_selection.yaml
    pts_save_events_jsonl: false

memory:
  side_center_threshold_x: 0.05
  side_center_threshold_y: 0.05

search_policy:
  yaw_scan_speed: 0.45
  pitch_scan_speed: 0.2
  fallback_sweep_period_s: 2.0

state_machine:
  lost_frame_threshold: 8
  reacquire_threshold: 2

logging:
  output_dir: runs/latest
  events_file: events.jsonl
  metrics_file: metrics_summary.json
  run_meta_file: run_meta.json
  verbosity: 1

runtime:
  no_frame_sleep_s: 0.002
  no_frame_warn_interval_s: 2.0
  # For PX4 auto_takeoff runs: gate heavy CV inference until drone is flight-ready
  # (OFFBOARD started or min relative altitude reached) to avoid lockstep starvation.
  px4_skip_inference_until_offboard: true
  px4_ready_warn_interval_s: 2.0

viz:
  overlay:
    track_default_color: [80, 80, 80]
    primary_default_color: [0, 255, 0]
    primary_locked_color: [0, 165, 255]
    primary_switch_pending_color: [0, 255, 255]
    primary_lost_color: [0, 0, 255]

scenarios:
  target_mode: synthetic
  world_name: raptor_mvp
  model_name: target_stub
  set_pose_timeout_ms: 1000
  update_hz: 15.0
  center: [0.0, 0.0]
  z: 0.85
  profiles:
    slow_circle:
      mode: circle
      radius: 1.8
      speed: 0.7
      duration_s: 30
    fast_circle:
      mode: circle
      radius: 1.8
      speed: 1.6
      duration_s: 30
    zigzag:
      mode: zigzag
      amplitude: 1.8
      period_s: 4.0
      forward_speed: 0.7
      duration_s: 30
    temporary_disappearance:
      mode: temporary_disappearance
      radius: 1.6
      speed: 0.9
      hide_start_s: 8.0
      hide_duration_s: 5.0
      hide_pose: [20.0, 20.0, 0.85]
      duration_s: 30
    long_absence:
      mode: long_absence
      radius: 1.6
      speed: 0.9
      hide_start_s: 8.0
      hide_duration_s: 15.0
      hide_pose: [20.0, 20.0, 0.85]
      duration_s: 30
  target_modes:
    synthetic:
      world_name: raptor_mvp
      model_name: target_stub
      center: [0.0, 0.0]
      z: 0.85
      profiles:
        slow_circle:
          mode: circle
          radius: 1.8
          speed: 0.7
          duration_s: 30
        fast_circle:
          mode: circle
          radius: 1.8
          speed: 1.6
          duration_s: 30
        zigzag:
          mode: zigzag
          amplitude: 1.8
          period_s: 4.0
          forward_speed: 0.7
          duration_s: 30
        temporary_disappearance:
          mode: temporary_disappearance
          radius: 1.6
          speed: 0.9
          hide_start_s: 8.0
          hide_duration_s: 5.0
          hide_pose: [20.0, 20.0, 0.85]
          duration_s: 30
        long_absence:
          mode: long_absence
          radius: 1.6
          speed: 0.9
          hide_start_s: 8.0
          hide_duration_s: 15.0
          hide_pose: [20.0, 20.0, 0.85]
          duration_s: 30
    actor:
      world_name: raptor_mvp_actor
      model_name: target_actor
      center: [0.0, 0.0]
      z: 0.0
      platform_overrides:
        iris:
          world_name: raptor_mvp_iris_actor
          model_name: target_actor
          center: [0.0, 0.0]
          z: 0.0
        px4:
          world_name: default
          model_name: target_actor
          center: [8.0, 0.0]
          z: 1.0
          spawn_if_missing: true
          spawn_uri: https://fuel.gazebosim.org/1.0/chapulina/models/walking actor/2
          reference_model_name: x500_0
